<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agentic RAG Chat</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  .container {
    background: #ffffff;
    border-radius: 20px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    width: 100%;
    max-width: 640px;
    overflow: hidden;
  }

  .header {
    background: linear-gradient(135deg, #667eea, #764ba2);
    padding: 28px 32px;
    color: white;
  }

  .header h1 {
    font-size: 22px;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .header p {
    font-size: 13px;
    opacity: 0.85;
    margin-top: 4px;
  }

  .upload-section {
    padding: 20px 32px;
    background: #f8f9fc;
    border-bottom: 1px solid #eaeaf2;
    display: flex;
    gap: 10px;
    align-items: center;
    flex-wrap: wrap;
  }

  .file-label {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: white;
    border: 1.5px solid #d7d9e6;
    border-radius: 10px;
    padding: 9px 16px;
    font-size: 13px;
    color: #444;
    cursor: pointer;
    transition: border-color 0.2s;
  }
  .file-label:hover { border-color: #764ba2; }
  input[type="file"] { display: none; }

  .btn {
    border: none;
    border-radius: 10px;
    padding: 10px 18px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
  }
  .btn:active { transform: scale(0.97); }

  .btn-primary {
    background: linear-gradient(135deg, #667eea, #764ba2);
    color: white;
    box-shadow: 0 4px 12px rgba(118,75,162,0.35);
  }
  .btn-primary:hover { box-shadow: 0 6px 16px rgba(118,75,162,0.45); }

  #uploadStatus {
    font-size: 12.5px;
    color: #16a34a;
    margin-top: 8px;
    width: 100%;
  }

  #chat {
    height: 380px;
    overflow-y: auto;
    padding: 20px 24px;
    background: #fbfbfd;
  }

  .msg {
    margin: 10px 0;
    display: flex;
    flex-direction: column;
    max-width: 85%;
  }

  .msg.user { align-items: flex-end; margin-left: auto; }
  .msg.bot { align-items: flex-start; }

  .bubble {
    padding: 10px 15px;
    border-radius: 14px;
    font-size: 14px;
    line-height: 1.45;
  }

  .msg.user .bubble {
    background: linear-gradient(135deg, #667eea, #764ba2);
    color: white;
    border-bottom-right-radius: 4px;
  }

  .msg.bot .bubble {
    background: white;
    color: #222;
    border: 1px solid #eaeaf2;
    border-bottom-left-radius: 4px;
  }

  .steps {
    font-size: 11px;
    color: #a3a3b3;
    margin-top: 4px;
    padding-left: 4px;
  }

  .input-row {
    display: flex;
    gap: 10px;
    padding: 18px 24px;
    background: white;
    border-top: 1px solid #eaeaf2;
  }

  #question {
    flex: 1;
    border: 1.5px solid #d7d9e6;
    border-radius: 10px;
    padding: 11px 16px;
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s;
  }
  #question:focus { border-color: #764ba2; }

  .empty-hint {
    color: #b3b3c2;
    font-size: 13px;
    text-align: center;
    margin-top: 140px;
  }

  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-thumb { background: #d7d9e6; border-radius: 10px; }
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <h1>🧠 Agentic RAG Chat</h1>
    <p>Upload a document and ask questions — the AI agent answers based on your document</p>
  </div>

  <div class="upload-section">
    <label class="file-label" for="fileInput">
      📎 <span id="fileName">Choose a file</span>
    </label>
    <input type="file" id="fileInput" onchange="updateFileName()" />
    <button class="btn btn-primary" onclick="uploadFile()">Upload</button>
    <div id="uploadStatus"></div>
  </div>

  <div id="chat">
    <div class="empty-hint" id="emptyHint">No messages yet — upload a document and ask a question 💬</div>
  </div>

  <div class="input-row">
    <input type="text" id="question" placeholder="Type your question..." onkeydown="if(event.key==='Enter') send()" />
    <button class="btn btn-primary" onclick="send()">Send</button>
  </div>
</div>

<script>
const API_URL = "https://agentic-rag-project-o0t3.onrender.com";

function updateFileName() {
  const fileInput = document.getElementById("fileInput");
  const fileName = document.getElementById("fileName");
  fileName.innerText = fileInput.files[0] ? fileInput.files[0].name : "Choose a file";
}

async function uploadFile() {
  const fileInput = document.getElementById("fileInput");
  const file = fileInput.files[0];
  if (!file) {
    alert("Please select a file first.");
    return;
  }
  const statusEl = document.getElementById("uploadStatus");
  statusEl.style.color = "#666";
  statusEl.innerText = "⏳ Uploading...";

  const formData = new FormData();
  formData.append("file", file);

  try {
    const res = await fetch(`${API_URL}/upload`, { method: "POST", body: formData });
    if (!res.ok) {
      const text = await res.text();
      throw new Error(`Server returned ${res.status}: ${text.slice(0, 200)}`);
    }
    const data = await res.json();
    statusEl.style.color = "#16a34a";
    statusEl.innerText = `✅ ${data.filename} uploaded (${data.chunks} chunks)`;
  } catch (err) {
    statusEl.style.color = "#dc2626";
    statusEl.innerText = `❌ ${err.message || "Something went wrong. Please try again."}`;
  }
}

async function send() {
  const q = document.getElementById("question").value.trim();
  if (!q) return;

  const chat = document.getElementById("chat");
  const emptyHint = document.getElementById("emptyHint");
  if (emptyHint) emptyHint.remove();

  document.getElementById("question").value = "";

  const userMsg = document.createElement("div");
  userMsg.className = "msg user";
  userMsg.innerHTML = `<div class="bubble">${q}</div>`;
  chat.appendChild(userMsg);
  chat.scrollTop = chat.scrollHeight;

  const loadingMsg = document.createElement("div");
  loadingMsg.className = "msg bot";
  loadingMsg.innerHTML = `<div class="bubble">⏳ Thinking...</div>`;
  chat.appendChild(loadingMsg);
  chat.scrollTop = chat.scrollHeight;

  try {
    const res = await fetch(`${API_URL}/chat`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ question: q })
    });
    if (!res.ok) {
      const text = await res.text();
      throw new Error(`Server returned ${res.status}: ${text.slice(0, 200)}`);
    }
    const data = await res.json();

    loadingMsg.innerHTML = `
      <div class="bubble">${data.answer}</div>
      <div class="steps">${(data.steps || []).join(" → ")}</div>
    `;
  } catch (err) {
    loadingMsg.innerHTML = `<div class="bubble">❌ ${err.message || "Something went wrong."}</div>`;
  }
  chat.scrollTop = chat.scrollHeight;
}
</script>
</body>
</html>
